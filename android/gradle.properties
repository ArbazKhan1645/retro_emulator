# ── JVM Heap ──────────────────────────────────────────────────────────
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# ── Android ───────────────────────────────────────────────────────────
android.useAndroidX=true
android.enableJetifier=false
android.newDsl=false
android.builtInKotlin=false

# ── R8 full mode — more aggressive dead-code elimination ──────────────
android.enableR8.fullMode=true

# ── Gradle performance ────────────────────────────────────────────────
# Daemon keeps the JVM warm between builds (much faster incremental builds)
org.gradle.daemon=true

# Parallel project compilation
org.gradle.parallel=true

# Cache task outputs — skip re-running tasks whose inputs haven't changed
org.gradle.caching=true

# Configuration cache — DISABLED: incompatible with Flutter Gradle plugin's MinSdkCheck task
org.gradle.configuration-cache=false

# Lazy task configuration — disabled to avoid Flutter plugin compatibility issues
org.gradle.configureondemand=false

# ── Kotlin ────────────────────────────────────────────────────────────
kotlin.incremental=true
kotlin.caching.enabled=true
